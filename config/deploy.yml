# config/deploy.yml — Tabla (Intranet KKC Lendava)
# Vzorec prilagojen po delovodnik_rails (isti strežnik 193.2.53.52).
# POMEMBNO: Tabla ima LOČENE porte od Delovodnika in Prisotnosti, da se ne prekrivajo.
#   - PG accessory:    5436  (Delovodnik 5434, Prisotnost verjetno 5432/5433)
#   - Meilisearch:     7701  (Delovodnik 7700)
#   - proxy http_port: 4002  (Delovodnik 4000)
#   - proxy https_port:8445  (Delovodnik 8443)
# SSL termina nginx na strežniku (proxy.ssl: false), kot pri Delovodniku.

service: tabla
image: vucko/tabla

servers:
  web:
    hosts:
      - 193.2.53.52
  # Solid Queue izvajalec (ista slika in env kot web; ločen proces za ozadnja opravila)
  jobs:
    hosts:
      - 193.2.53.52
    cmd: "nice -n 10 bin/jobs"

ssh:
  user: deploy

registry:
  server: git.kl-kl.si
  username: vucko
  password:
    - KAMAL_REGISTRY_PASSWORD

proxy:
  app_port: 3000
  ssl: false                 # SSL termina nginx na strežniku (i.kl-kl.si)
  host: i.kl-kl.si
  healthcheck:
    path: /up
    interval: 5
    timeout: 5
  run:
    http_port: 4002          # LOČEN od Delovodnika (4000) — nginx posreduje sem
    https_port: 8445

env:
  clear:
    RAILS_ENV: production
    RAILS_SERVE_STATIC_FILES: "true"
    RAILS_LOG_TO_STDOUT: "true"
    RAILS_MAX_THREADS: 5
    DB_POOL: 10
    KAMAL_REVISION: <%= `git rev-parse --short HEAD`.strip rescue '1.0.0' %>
    # Solid Queue teče v ločenem `jobs` procesu (ne v Puma) — glej servers.jobs
    # OCR jezik
    OCR_LANGUAGE: "slv+hun"
    # E-mail (isti SMTP kot Delovodnik)
    SMTP_HOST: "mail.arnes.si"
    SMTP_PORT: 25
    DEFAULT_FROM_EMAIL: "intranet@kl-kl.si"
    MAILER_URL_HOST: "i.kl-kl.si"
    MAILER_URL_PROTOCOL: "https"
    # Prisotnost API (produkcijski endpoint — preveri pravi URL)
    PRISOTNOST_API_URL: "https://p.kl-kl.si/api/v1"
    # Meilisearch (LASTEN accessory, ločen indeks tabla_documents).
    # POVEZAVA prek Docker omrežja: ime kontejnerja + NOTRANJI port (7700), NE host-mapiran (7701).
    MEILISEARCH_URL: http://tabla-meilisearch:7700
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - MEILISEARCH_MASTER_KEY
    - PRISOTNOST_API_TOKEN
    - SMTP_USERNAME
    - SMTP_PASSWORD

builder:
  # Gradnja slike na strežniku (amd64), ker je MacBook arm64
  remote: ssh://deploy@193.2.53.52
  arch: amd64

volumes:
  - tabla_storage:/rails/storage

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

accessories:
  db:
    image: postgres:16
    host: 193.2.53.52
    port: "5436:5432"        # LOČEN port od Delovodnika (5434)
    env:
      clear:
        POSTGRES_USER: tabla_user
        POSTGRES_DB: tabla_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - tabla_pg_data:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:latest
    host: 193.2.53.52
    port: "7701:7700"        # LOČEN port od Delovodnika (7700)
    env:
      clear:
        MEILI_NO_ANALYTICS: true
        MEILI_ENV: production
      secret:
        - MEILI_MASTER_KEY
    directories:
      - tabla_meilisearch_data:/meili_data
