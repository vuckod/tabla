# PostgreSQL — Tabla (Intranet KL-KL)
# Vzorec enak kot v Delovodniku.

default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST") { "tabla-db" } %>
  username: <%= ENV.fetch("DB_USERNAME") { "postgres" } %>
  password: <%= ENV.fetch("DB_PASSWORD") { "password" } %>

development:
  primary: &primary_development
    <<: *default
    url: <%= ENV.fetch("DATABASE_URL") { "postgres://postgres:password@tabla-db:5432/tabla_development" } %>
  cache:
    <<: *primary_development
    url: <%= ENV.fetch("DATABASE_URL") { "postgres://postgres:password@tabla-db:5432/tabla_development" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_development
    url: <%= ENV.fetch("DATABASE_URL") { "postgres://postgres:password@tabla-db:5432/tabla_development" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_development
    url: <%= ENV.fetch("DATABASE_URL") { "postgres://postgres:password@tabla-db:5432/tabla_development" } %>
    migrations_paths: db/cable_migrate

test:
  <<: *default
  database: tabla_test

production:
  primary: &primary_production
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
  cache:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    url: <%= ENV["DATABASE_URL"] %>
    migrations_paths: db/cable_migrate
