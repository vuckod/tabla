<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Prišlo je do napake — Tabla</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc; color: #0f172a;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f1f5f9; }
      .card { background: #1e293b !important; border-color: #334155 !important; }
      .muted { color: #94a3b8 !important; }
    }
    .card {
      max-width: 28rem; text-align: center; background: white;
      border: 1px solid #e2e8f0; border-radius: 0.75rem; padding: 2.5rem 2rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .icon { font-size: 2.5rem; line-height: 1; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p.muted { color: #64748b; margin-bottom: 1.5rem; font-size: 0.9375rem; line-height: 1.5; }
    a.btn {
      display: inline-block; background: #4f46e5; color: white; text-decoration: none;
      padding: 0.625rem 1.25rem; border-radius: 0.5rem; font-weight: 600; font-size: 0.9375rem;
    }
    a.btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon" aria-hidden="true">⚠️</div>
    <h1>Prišlo je do napake</h1>
    <p class="muted">Žal je prišlo do nepričakovane napake na strežniku. Poskusite kasneje ali se obrnite na skrbnika.</p>
    <a class="btn" href="/">Nazaj na domov</a>
  </div>
</body>
</html>
